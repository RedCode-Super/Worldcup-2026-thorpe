name: Fetch World Cup Scores

on:
  schedule:
    # Four runs per day cover every WC 2026 kickoff window (all UTC):
    #   06:45 — after 04:00 UTC (US west-coast) games finish (~06:15)
    #   15:45 — after 13:00 UTC (morning ET) games finish (~15:10)
    #   21:45 — after 19:00 UTC (afternoon ET) games finish (~21:15)
    #   00:15 — after 22:00 UTC (evening ET) games finish (~00:10)
    # Off-minute to avoid GitHub's top-of-hour queue congestion.
    - cron: "45 6  * * *"
    - cron: "45 15 * * *"
    - cron: "45 21 * * *"
    - cron: "15 0  * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Fetch scores from ESPN
        run: |
          TODAY=$(date -u +%Y%m%d)
          HTTP_STATUS=$(curl -s -o /tmp/espn_raw.json -w "%{http_code}" \
            "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=200&dates=20260611-${TODAY}")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ESPN API returned HTTP $HTTP_STATUS — skipping update"
            exit 0
          fi

          jq '{
            matches: [
              .events[]? |
              .competitions[0] as $c |
              ($c.competitors[]? | select(.homeAway == "home")) as $home |
              ($c.competitors[]? | select(.homeAway == "away")) as $away |
              {
                homeTeam: { name: $home.team.displayName },
                awayTeam: { name: $away.team.displayName },
                stage: ({
                  "group-stage":     "GROUP_STAGE",
                  "round-of-32":     "ROUND_OF_32",
                  "round-of-16":     "LAST_16",
                  "quarterfinals":   "QUARTER_FINALS",
                  "semifinals":      "SEMI_FINALS",
                  "3rd-place-match": "THIRD_PLACE",
                  "final":           "FINAL"
                }[.season.slug] // "GROUP_STAGE"),
                score: {
                  fullTime: {
                    home: (if $c.status.type.completed then ($home.score | tonumber) else null end),
                    away: (if $c.status.type.completed then ($away.score | tonumber) else null end)
                  },
                  penalties: (
                    if $home.shootoutScore != null and $away.shootoutScore != null
                    then { home: ($home.shootoutScore | tonumber), away: ($away.shootoutScore | tonumber) }
                    else null
                    end
                  )
                },
                status: (if $c.status.type.completed then "FINISHED" else "SCHEDULED" end),
                utcDate: .date
              }
            ]
          }' /tmp/espn_raw.json > data/matches.json

          echo "Saved $(jq '.matches | length' data/matches.json) matches"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json
          git diff --cached --quiet || git commit -m "chore: update scores [skip ci]"
          git push
