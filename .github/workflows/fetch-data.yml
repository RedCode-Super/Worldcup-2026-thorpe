name: Fetch World Cup Data

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Fetch standings
        run: |
          curl -s \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/standings" \
            -o data/standings.json
          echo "Standings fetched"

      - name: Fetch matches
        run: |
          curl -s \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o data/matches.json
          echo "Matches fetched"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/standings.json data/matches.json
          git diff --cached --quiet || git commit -m "chore: update match data [skip ci]"
          git push
